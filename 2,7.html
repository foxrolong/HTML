<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<style>
		body {
            width: 90%;
            font-family: Arial;
            background-color:#f2f3d4;
            margin: 0 auto;
        }
        * {
            box-sizing: border-box;
        }
        .top {
            width: 100%;
            height: 100px;
            background-color:#EEEEEE;
  			text-align: center;
            color: blue;
            position: relative;
        }
        .top img {
            width: 80px;
            position: absolute;
            height: 80px;
            left: 10px;
            top: 10px;
        }
        .top h1 {
            
            font-size:35px;
            line-height: 100px;
            font-family: "Comic Sans MS", cursive;
        }
        .menu {
        	width: 100%;
        	height: 50px;
            background-color: #336699;
            padding: 5px 0;
        }
        .menu ul {
            margin: 10px;
            padding-left: 20px;
        }
        .menu li {
            list-style: none;
            display: inline-block;
            margin-right: 25px;
        }
        .menu a {
            text-decoration: none;
            font-weight: bold;
            color: white;
            font-size: 16px;
        }
        .menu a:hover{
        	color: red;
		}
        .container {
            width: 100%;
            display: flex;
            background-color: white;
            padding: 30px;
        }
        .left {
            width: 20%;
            text-align: left;
            line-height: 35px;
        }
        .center {
            width: 45%;
        }
        .right {
        	line-height: 25px;
            width: 35%;
            padding-left: 50px;
            border-left: 1px solid #eee;
        }
        .center input[type="text"], 
        .center input[type="tel"], 
        .center select,
        .center textarea {
            width: 100%;
            margin-bottom: 10px;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
        .center textarea {
            height: 120px;
        }
        .center input[type="submit"]{
        	background-color:green;
        	 color: white;
        	 border: none; 
        	 padding: 5px 10px;
        	}
        .center input[type="reset"] { 
        	background-color: #0000ff; 
        	color: white; 
        	border: none; 
        	padding: 5px 10px;
        	}
        .center input[type="submit"]:hover{
        	background: #008000;
    		color: white;
    		border: none;
    		padding: 10px 20px;
    		cursor: pointer;
    		transition: 0.3s; 
        }
        .center input[type="reset"]:hover{
        	background: blue;
    		color: white;
    		border: none;
    		padding: 10px 20px;
    		cursor: pointer;
    		transition: 0.3s;
        }
        .right ul {
            list-style: none;
        }
        .right li {
            margin-bottom:12px;
        }
        .right a {
            text-decoration:none;
            color: black;}
        .bottom {
            width: 100%;
            color: blue;
            background-color: #F0F0F0;
            text-align: center;
            padding: 15px 0;

        }
	</style>
</head>
<body>
	<div class="top">
		<img src="...1long.png">
		<h1>TIN TỨC 24H</h1>
	</div>
	<div class="menu">
		<ul>
			<li><a href="#">Chính trị</a></li>
			<li><a href="#">Xã hoi</a></li>
			<li><a href="#">Suc khoe</a></li>
			<li><a href="#">Giao duc</a></li>
			<li><a href="#">The thao</a></li>
			<li><a href="#">Liên hệ</a></li>
		</ul>
	</div>
	<div class="container">
		<div class="left">
			<label>Họ tên: *</label><br>
        	<label>Địa chỉ: </label><br>
        	<label>Số điện thoại: *</label><br>
        	<label>Giới tính: </label><br>
        	<label>Năm sinh: </label><br>
        	<label>Nội dung liên hệ: *</label>
        </div>

		<div class="center">
			<form>
                <input type="text" placeholder="Họ tên">
                <input type="text" placeholder="Địa chỉ">
                <input type="tel" placeholder="Số điện thoại">
                
            	<div>
                    <input type="radio" name="gt" id="nam"> <label for="nam">Nam</label>
                    <input type="radio" name="gt" id="nu"> <label for="nu">Nữ</label>
                </div>

                <select>
                    <option>2003</option>
                    <option>2004</option>
                    <option>2005</option>
                </select>

                <textarea></textarea>

                <div>
                    <input type="submit" class="submit" value="Gửi thông tin góp ý">
                    <input type="reset" class="reset" value="Nhập lại">
                </div>
            </form>
		</div>
		<div class="right">
			<ul>
                <li><a href="#">Tin tức thị trường</a></li>
                <li><a href="#">Tin tức trong ngày</a></li>
                <li><a href="#">Thông tin chứng khoán</a></li>
                <li><a href="#">Sức khỏe đời sống</a></li>
                <li><a href="#">Công nghệ thông tin</a></li>
            </ul>
		</div>
	</div>

	<div class="bottom">
		<p>Cơ quan chủ quản: Công ty Cổ phần Quảng cáo Trực tuyến 24H<br><b style="font-style: italic;" >© 24h.com</b></p>
	</div>

</body>
</html>
